name: setup and test
on: push
jobs:
  
  build:
    
    runs-on: ubuntu-latest

    steps: 
      # Клонируем репозиторий
      - uses: actions/checkout@v4
      # Устанавливаем Node.js
      - uses: actions/setup-node@v4
      # Ставим зависимости
      - run: npm install
      # Установка билда
      - run: make setup
      - run: make start
      # Запуск тестов
      - name: run tests
        run: make test
      # Запуск линтера
      - run: make lint